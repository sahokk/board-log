<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wood background -->
  <rect width="100" height="100" fill="#f5ede4"/>

  <!-- Dice shape with wood texture -->
  <g transform="translate(50, 50)">
    <!-- Main dice body -->
    <rect x="-35" y="-35" width="70" height="70" rx="8" fill="#8b7355" opacity="0.9"/>

    <!-- Dice dots -->
    <circle cx="-15" cy="-15" r="5" fill="#f9f3ed"/>
    <circle cx="0" cy="0" r="5" fill="#f9f3ed"/>
    <circle cx="15" cy="15" r="5" fill="#f9f3ed"/>
    <circle cx="-15" cy="15" r="5" fill="#f9f3ed"/>
    <circle cx="15" cy="-15" r="5" fill="#f9f3ed"/>
  </g>
</svg>
